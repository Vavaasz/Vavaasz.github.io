<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contratos RH</title>
  <script>
    (function () {
      const ASSET_BUST_KEY = "tka_asset_bust_token";
      const ASSET_BUST_FALLBACK = "20260428-contrato-lock";
      window.tkaResolveAssetUrl = function (path) {
        const token = localStorage.getItem(ASSET_BUST_KEY) || ASSET_BUST_FALLBACK;
        const url = new URL(path, window.location.origin);
        if (token && url.origin === window.location.origin) {
          url.searchParams.set("v", token);
        }
        return `${url.pathname}${url.search}`;
      };
      window.tkaLoadStylesheet = function (path) {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = window.tkaResolveAssetUrl(path);
        document.head.appendChild(link);
      };
      window.tkaLoadLocalScript = function (path, target) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = window.tkaResolveAssetUrl(path);
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Falha ao carregar ${path}`));
          (target || document.body).appendChild(script);
        });
      };
      window.tkaLoadStylesheet("/recursos-humanos/contrato/styles.css");
      window.tkaLoadStylesheet("/shared/tka-theme.css");
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Recursos Humanos</p>
      <h1>Contratos RH</h1>
      <p class="muted">Acompanhamento administrativo dos contratos admissionais enviados em PDF.</p>
    </div>
    <div class="topbar-side">
      <a id="rhHomeLink" class="button secondary" href="/recursos-humanos/">Painel RH</a>
      <a id="homeLink" class="button secondary" href="/?tab=systems">Home</a>
      <button id="themeToggleBtn" class="button secondary" type="button">Tema escuro</button>
    </div>
  </header>

  <main class="shell">
    <section class="panel summary-strip">
      <div class="summary-card">
        <span>Total</span>
        <strong id="totalContractsCount">0</strong>
      </div>
      <div class="summary-card">
        <span>Vigentes</span>
        <strong id="currentContractsCount">0</strong>
      </div>
      <div class="summary-card">
        <span>Superados</span>
        <strong id="archivedContractsCount">0</strong>
      </div>
    </section>

    <section class="panel">
      <div class="contract-tabs" role="tablist" aria-label="Categorias de contratos">
        <button class="contract-tab is-active" type="button" data-contract-stage-tab="current">Vigentes</button>
        <button class="contract-tab" type="button" data-contract-stage-tab="archived">Superados</button>
      </div>
      <p id="accessMessage" class="muted">Validando acesso do RH...</p>
    </section>

    <section id="currentStagePanel" class="panel contract-stage-panel" data-contract-stage-panel="current">
      <div class="panel-head">
        <strong>Vigentes</strong>
        <span id="currentCountLabel" class="muted">Carregando...</span>
      </div>
      <input id="currentSearchInput" class="search-input" type="search" placeholder="Buscar contratos vigentes..." />
      <div id="currentContractList" class="record-list"></div>
    </section>

    <section id="archivedStagePanel" class="panel contract-stage-panel hidden" data-contract-stage-panel="archived">
      <div class="panel-head">
        <strong>Superados</strong>
        <span id="archivedCountLabel" class="muted">Carregando...</span>
      </div>
      <input id="archivedSearchInput" class="search-input" type="search" placeholder="Buscar contratos superados..." />
      <div id="archivedContractList" class="record-list"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    Promise.resolve()
      .then(() => window.tkaLoadLocalScript("/shared/portal-tools.js"))
      .then(() => window.tkaLoadLocalScript("/shared/tka-theme.js"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/firebase-runtime-config.js"))
      .then(() => window.tkaLoadLocalScript("/shared/firestore-read-guard.js?v=20260623-quota-guard"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/gate-config.js"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/contrato/samples.js"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/contrato/template.js"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/contrato/pdf.js"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/contrato/list.js"))
      .catch(error => console.error(error));
  </script>
</body>
</html>

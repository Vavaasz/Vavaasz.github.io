<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Plantão - Operador</title>
  <script>
    (function () {
      const ASSET_BUST_KEY = "tka_asset_bust_token";
      const ASSET_BUST_FALLBACK = "20260619-plantao-password-persist";
      window.tkaResolveAssetUrl = function (path) {
        const storedToken = localStorage.getItem(ASSET_BUST_KEY) || "";
        const token = [ASSET_BUST_FALLBACK, storedToken].filter(Boolean).join("-");
        const url = new URL(path, window.location.origin);
        if (token && url.origin === window.location.origin) {
          url.searchParams.set("v", token);
        }
        return `${url.pathname}${url.search}`;
      };
      window.tkaLoadStylesheet = function (path) {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = window.tkaResolveAssetUrl(path);
        document.head.appendChild(link);
      };
      window.tkaLoadLocalScript = function (path, target) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = window.tkaResolveAssetUrl(path);
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Falha ao carregar ${path}`));
          (target || document.body).appendChild(script);
        });
      };
      window.tkaLoadStylesheet("/monitoramento/plantao/styles.css");
      window.tkaLoadStylesheet("/shared/tka-theme.css");
    })();
  </script>
</head>
<body data-page-role="operador">
  <script>
    window.location.replace("/monitoramento/plantao/editor.html" + window.location.search + window.location.hash);
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TKA Troca de Turno</title>
  <meta name="theme-color" content="#0f1217">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TKA Turno">
  <link rel="manifest" href="/whatsappmonitoramento/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/tka-shield-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/tka-shield-180.png">
  <link rel="stylesheet" href="/whatsappmonitoramento/styles.css?v=shift-mobile-20260623">
</head>
<body class="launcher-mobile-mode shift-supervisor-mode">
  <main class="shell" aria-label="TKA Troca de Turno">
    <header class="titlebar">
      <div class="brand">
        <img class="brand-mark" src="/assets/tka-shield-64.png" alt="" aria-hidden="true">
        <div>
          <strong>Troca de Turno</strong>
          <span id="clock">--:--</span>
        </div>
      </div>
      <div class="window-actions">
        <a class="icon-window" href="/whatsappmonitoramento/app/" title="Operacional" aria-label="Operacional">_</a>
        <a class="icon-window" href="/whatsappmonitoramento/" title="Desktop" aria-label="Desktop">-</a>
        <a class="icon-window danger" href="/?tab=systems" title="Portal" aria-label="Portal">x</a>
      </div>
    </header>

    <section class="summary-panel" aria-live="polite">
      <div>
        <span class="eyebrow">Janela</span>
        <h1 id="hourLabel">24h</h1>
      </div>
      <div class="summary-grid">
        <span><b id="expectedCount">0</b> trocas</span>
        <span><b id="dueCount">0</b> nao conf.</span>
        <span><b id="queueCount">0</b> lista</span>
      </div>
    </section>

    <section class="runtime-panel" aria-live="polite">
      <div>
        <span>WhatsApp</span>
        <strong id="runtimeWhatsapp">--</strong>
      </div>
      <div>
        <span>Atualizado</span>
        <strong id="runtimeLastMessage">--</strong>
      </div>
    </section>

    <section id="activePopup" class="popup-card">
      <div class="popup-empty">Carregando trocas de turno...</div>
    </section>

    <section class="queue-panel">
      <div class="section-line">
        <strong>Trocas</strong>
        <span id="sourceInfo">Conectando...</span>
      </div>
      <div class="queue-tabs" role="tablist" aria-label="Trocas de turno">
        <button class="queue-tab active" type="button" data-queue-tab="pending" role="tab" aria-selected="true">Nao confirmados</button>
        <button class="queue-tab" type="button" data-queue-tab="confirmed" role="tab" aria-selected="false">Resolvidos</button>
      </div>
      <div id="queueList" class="queue-list"></div>
    </section>

    <footer class="footer">
      <button id="reloadButton" type="button">Dados</button>
      <button id="updateAppButton" type="button">App</button>
      <button id="manualPlaceInfoToggle" type="button">Regras</button>
      <button id="shiftScheduleToggle" type="button">Escalas / Postos</button>
      <button id="notificationButton" type="button">Notif.</button>
      <button id="installButton" type="button" hidden>Baixar</button>
      <button id="logsButton" type="button">Logs</button>
    </footer>
  </main>

  <section id="manualPlaceInfoBox" class="manual-info-box shift-rules-modal" hidden aria-label="Regras de turno">
    <div class="shift-rules-panel">
      <div class="logs-head">
        <div>
          <strong>Regras de turno</strong>
          <span>Posto, funcionario, turno e excecoes do supervisor.</span>
        </div>
        <button id="manualPlaceInfoClose" class="icon-window" type="button" title="Fechar regras" aria-label="Fechar regras">x</button>
      </div>
      <div class="shift-rules-grid">
        <label class="field-label" for="manualRuleScope">Escopo</label>
        <select id="manualRuleScope">
          <option value="place_worker_shift" selected>Posto+func.+turno</option>
          <option value="place">Posto</option>
          <option value="place_shift">Posto+turno</option>
          <option value="worker">Funcionario</option>
          <option value="place_worker">Posto+func.</option>
          <option value="shift">Turno</option>
          <option value="group">Grupo</option>
          <option value="group_shift">Grupo+turno</option>
        </select>
        <label class="field-label" for="manualShiftKind">Tipo</label>
        <select id="manualShiftKind">
          <option value="shift_start" selected>Inicio de turno</option>
          <option value="shift_end">Saida/fim de turno</option>
          <option value="shift_handoff">Passagem de posto</option>
          <option value="no_qra_needed">Sem QRA necessario</option>
          <option value="custom">Outro</option>
        </select>
      </div>
      <label class="field-label" for="manualPlaceName">Posto/local</label>
      <input id="manualPlaceName" list="manualPlaceOptions" maxlength="180" placeholder="Ex.: Coevo SJC">
      <datalist id="manualPlaceOptions"></datalist>
      <label class="field-label" for="manualWorkerName">Funcionario/QRA</label>
      <input id="manualWorkerName" list="manualWorkerOptions" maxlength="180" placeholder="Nome, contato ou telefone">
      <datalist id="manualWorkerOptions"></datalist>
      <label class="field-label" for="manualPlaceStartTime">Horario de inicio esperado</label>
      <input id="manualPlaceStartTime" type="time">
      <label class="field-label" for="manualPlacePatternText">Regra para agente/API</label>
      <textarea id="manualPlacePatternText" rows="5" maxlength="1400" placeholder="Ex.: Neste posto o turno das 18:00 e assumido por Fulano. Se aparecer mensagem de saida pela manha, nao contar como inicio."></textarea>
      <div class="manual-info-actions">
        <button type="button" id="manualPlaceInfoSave" class="response-button">Salvar regra</button>
        <button type="button" id="manualPlaceInfoCancel" class="response-button subtle" hidden>Cancelar edicao</button>
        <span id="manualPlaceInfoStatus" class="item-meta"></span>
      </div>
      <div id="manualPlaceInfoList" class="manual-info-list"></div>
    </div>
  </section>

  <section id="shiftScheduleBox" class="shift-schedule-modal" hidden aria-label="Escalas e postos">
    <div class="shift-schedule-panel">
      <div class="logs-head">
        <div>
          <strong>Escalas / Postos</strong>
          <span id="shiftScheduleStatus">Carregando escalas...</span>
        </div>
        <button id="shiftScheduleClose" class="icon-window" type="button" title="Fechar escalas" aria-label="Fechar escalas">x</button>
      </div>
      <div id="shiftScheduleList" class="shift-schedule-list"></div>
    </div>
  </section>

  <section id="logsModal" class="logs-modal hidden" aria-label="Logs do Monitoramento" aria-modal="true">
    <div class="logs-panel">
      <div class="logs-head">
        <div>
          <strong>Logs do app</strong>
          <span id="logsSubtitle">Carregando...</span>
        </div>
        <button id="closeLogsButton" class="icon-window" type="button" title="Fechar logs" aria-label="Fechar logs">x</button>
      </div>
      <div id="logsBody" class="logs-body"></div>
      <div class="logs-actions">
        <button id="refreshLogsButton" type="button">Atualizar logs</button>
        <button id="copyLogsButton" type="button">Copiar resumo</button>
      </div>
    </div>
  </section>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    window.TKA_HIDE_MAINTENANCE_TOOLS = true;
    window.TKA_MOBILE_MODE = true;
    window.TKA_PWA_MODE = true;
    window.TKA_LAUNCHER_MOBILE_MODE = true;
    window.TKA_MONITORAMENTO_OPERATIONAL = true;
    window.TKA_SHIFT_CHANGE_MODE = true;
    (function () {
      const ASSET_BUST_KEY = "tka_asset_bust_token";
      window.tkaResolveAssetUrl = function (path) {
        const token = localStorage.getItem(ASSET_BUST_KEY) || "";
        const url = new URL(path, window.location.origin);
        if (token && url.origin === window.location.origin) url.searchParams.set("v", token);
        return `${url.pathname}${url.search}`;
      };
      window.tkaLoadLocalScript = function (path, target) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = window.tkaResolveAssetUrl(path);
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Falha ao carregar ${path}`));
          (target || document.body).appendChild(script);
        });
      };
    })();
    Promise.resolve()
      .then(() => window.tkaLoadLocalScript("/shared/portal-tools.js?wv=whatsapp-shift-20260619-4"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/firebase-runtime-config.js"))
      .then(() => window.tkaLoadLocalScript("/shared/firestore-read-guard.js?v=20260623-quota-guard"))
      .then(() => window.tkaLoadLocalScript("/whatsappmonitoramento/public-bridge-config.js?v=20260623-live-logs"))
      .then(() => window.tkaLoadLocalScript("/whatsappmonitoramento/app.js?v=shift-supervisor-20260624-shift-export-edit-v4"))
      .catch(error => console.error(error));
</script>
</body>
</html>

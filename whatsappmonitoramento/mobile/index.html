<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Monitoramento WhatsApp Operacional | TKA</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TKA Monitoramento">
  <link rel="manifest" href="/whatsappmonitoramento/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/tka-shield-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/tka-shield-180.png">
  <link rel="stylesheet" href="/whatsappmonitoramento/styles.css">
</head>
<body class="mobile-mode">
  <header class="topbar mobile-topbar">
    <div class="topbar-brand">
      <img class="topbar-logo" src="/assets/tka-shield-64.png" alt="" aria-hidden="true">
      <div>
        <p class="eyebrow">TKA</p>
        <h1>Operacao Monitoramento</h1>
        <p id="pageMeta" class="muted">Atualizando...</p>
      </div>
    </div>
    <nav class="top-actions">
      <a href="/whatsappmonitoramento/app/">App</a>
      <a href="/whatsappmonitoramento/">Desktop</a>
      <a href="/?tab=systems">Portal</a>
    </nav>
  </header>

  <main>
    <section id="connectionPanel" class="status-grid"></section>

    <section class="panel priority-panel">
      <div class="section-title">
        <div>
          <h2>Intervencoes agora</h2>
          <p class="muted">Somente o que precisa acao nesta janela.</p>
        </div>
        <span id="interventionCount" class="pill">0</span>
      </div>
      <div id="interventionList" class="stack-list"></div>
    </section>

    <section class="panel">
      <h2>Hora atual</h2>
      <div class="tab-row" role="tablist" aria-label="Hora atual">
        <button class="tab-button active" type="button" data-current-tab="pending" role="tab" aria-selected="true">Pendentes</button>
        <button class="tab-button" type="button" data-current-tab="confirmed" role="tab" aria-selected="false">Resolvidos 24h</button>
      </div>
      <div id="currentHourList" class="stack-list compact" data-current-panel="pending"></div>
      <div id="confirmedList" class="stack-list compact hidden" data-current-panel="confirmed"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <div>
          <h2>Historico recente</h2>
          <p class="muted">Ultimas janelas por hora.</p>
        </div>
      </div>
      <div id="hourSlots" class="slot-grid"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <div>
          <h2>Logs dos overlays</h2>
          <p class="muted">Acoes feitas nos computadores.</p>
        </div>
      </div>
      <div id="overlayLogs" class="log-grid"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <div>
          <h2>Padroes aprendidos</h2>
          <p class="muted">Resumo por grupo/posto.</p>
        </div>
      </div>
      <div id="groupPatterns" class="group-grid"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    window.TKA_HIDE_MAINTENANCE_TOOLS = true;
    window.TKA_MOBILE_MODE = true;
    window.TKA_MONITORAMENTO_OPERATIONAL = true;
    (function () {
      const ASSET_BUST_KEY = "tka_asset_bust_token";
      window.tkaResolveAssetUrl = function (path) {
        const token = localStorage.getItem(ASSET_BUST_KEY) || "";
        const url = new URL(path, window.location.origin);
        if (token && url.origin === window.location.origin) url.searchParams.set("v", token);
        return `${url.pathname}${url.search}`;
      };
      window.tkaLoadLocalScript = function (path, target) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = window.tkaResolveAssetUrl(path);
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Falha ao carregar ${path}`));
          (target || document.body).appendChild(script);
        });
      };
    })();
    Promise.resolve()
      .then(() => window.tkaLoadLocalScript("/shared/portal-tools.js?wv=whatsapp-live-20260618-6"))
      .then(() => window.tkaLoadLocalScript("/recursos-humanos/firebase-runtime-config.js"))
      .then(() => window.tkaLoadLocalScript("/shared/firestore-read-guard.js?v=20260623-quota-guard"))
      .then(() => window.tkaLoadLocalScript("/whatsappmonitoramento/public-bridge-config.js?v=20260623-live-logs"))
      .then(() => window.tkaLoadLocalScript("/whatsappmonitoramento/app.js?v=mobile-20260624-shift-export-edit-v4"))
      .catch(error => console.error(error));
</script>
</body>
</html>
